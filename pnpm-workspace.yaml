packages:
  - "apps/*"
  - "packages/*"

# No re-ejecutar `pnpm install` automáticamente antes de cada `pnpm run`.
# En CI (Amplify/Docker) esa reinstalación puede fallar (EACCES) y es innecesaria.
verifyDepsBeforeRun: "false"

# Dependencias con BINARIOS PRECOMPILADOS (no requieren compilador): se permite
# ejecutar su script de instalación con normalidad.
onlyBuiltDependencies:
  - sharp
  - esbuild
  - "@swc/core"
  - "@nestjs/core"

# Dependencias con build NATIVO (necesitarían toolchain de compilación). No son
# necesarias en runtime (son optimizaciones opcionales con fallback en JS), así
# que aprobamos OMITIR su build para que `pnpm install` no falle en imágenes
# slim sin compilador (ERR_PNPM_IGNORED_BUILDS).
ignoredBuiltDependencies:
  - msgpackr-extract
  - unrs-resolver

# IMPORTANTE (pnpm 11+): a partir de pnpm 11 la aprobación de build scripts NO se
# lee de las listas de arriba (eso es pnpm 10), sino de este mapa `allowBuilds`.
# Vercel usa pnpm 11 (packageManager), así que sin esto falla con
# ERR_PNPM_IGNORED_BUILDS. `true` = ejecutar su script; `false` = omitirlo (sin
# error). Se dejan también las listas de arriba por compatibilidad con pnpm 10.
allowBuilds:
  sharp: true
  esbuild: true
  "@swc/core": true
  "@nestjs/core": true
  msgpackr-extract: false
  unrs-resolver: false
